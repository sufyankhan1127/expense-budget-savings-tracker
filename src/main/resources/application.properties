# Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/ebstracker_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
