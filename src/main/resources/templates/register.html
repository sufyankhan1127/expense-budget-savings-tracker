<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - EBS Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; min-height: 100vh; display: flex; align-items: center; }
        .register-container { max-width: 900px; margin: 0 auto; }
        .left-panel {
            background: linear-gradient(135deg, #20c997 0%, #1ba87e 100%);
            color: white; border-radius: 15px 0 0 15px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 3rem; min-height: 500px;
        }
        .right-panel {
            background: white; border-radius: 0 15px 15px 0;
            padding: 3rem; box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .form-control { border-radius: 10px; padding: 12px 15px; border: 1px solid #e0e0e0; }
        .form-control:focus { border-color: #20c997; box-shadow: 0 0 0 0.2rem rgba(32, 201, 151, 0.25); }
        .btn-register {
            background: linear-gradient(135deg, #20c997 0%, #1ba87e 100%);
            border: none; border-radius: 10px; padding: 12px;
            font-weight: 600; width: 100%; color: white;
        }
        .error-text { color: #dc3545; font-size: 0.875rem; margin-top: 0.25rem; }
    </style>
</head>
<body>
<div class="container register-container">
    <div class="row shadow-lg rounded-4 overflow-hidden">
        <div class="col-md-5 left-panel d-none d-md-flex">
            <div class="text-center">
                <i class="bi bi-person-plus-fill" style="font-size: 4rem; opacity: 0.3;"></i>
                <h2 class="mt-4">Create Account</h2>
                <p>Join us today and take control of your finances.</p>
            </div>
        </div>
        <div class="col-md-7 right-panel">
            <h3 class="mb-4 fw-bold">Register</h3>

            <form th:action="@{/register}" method="post" th:object="${userDTO}">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Full Name</label>
                    <input type="text" th:field="*{fullName}" class="form-control" placeholder="Enter your full name"/>
                    <div th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}" class="error-text"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Email Address</label>
                    <input type="email" th:field="*{email}" class="form-control" placeholder="Enter your email"/>
                    <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="error-text"></div>
                    <div th:if="${emailError}" th:text="${emailError}" class="error-text"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Password</label>
                    <input type="password" th:field="*{password}" class="form-control" placeholder="Enter your password"/>
                    <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="error-text"></div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Confirm Password</label>
                    <input type="password" th:field="*{confirmPassword}" class="form-control" placeholder="Confirm your password"/>
                    <div th:if="${passwordError}" th:text="${passwordError}" class="error-text"></div>
                </div>
                <button type="submit" class="btn btn-register">Register</button>
                <div class="text-center mt-3">
                    <span class="text-muted">Already have an account?</span>
                    <a href="/login" class="text-decoration-none fw-semibold text-success">Login here</a>
                </div>
            </form>
        </div>
    </div>
    <div class="text-center mt-3 text-muted">
        <small>&copy; 2024 EBS Tracker. All rights reserved.</small>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
